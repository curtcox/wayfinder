[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_unused_configs = true
files = ["src", "tests", "hooks"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = "jsonschema.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "py_trees.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pyperplan.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pexpect.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "wayfinder.brains.bt"
disable_error_code = ["misc"]

[[tool.mypy.overrides]]
module = "wayfinder.brains.plan"
disable_error_code = ["misc"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
]
markers = [
    "conformance: Appendix B conformance vectors (Phase 3)",
    "live: requires network or API keys",
]

[tool.coverage.run]
source = ["wayfinder"]
branch = true
omit = [
]

[tool.coverage.report]
fail_under = 79
show_missing = true
skip_empty = true

[tool.coverage.paths]
source = ["src/wayfinder", "*/site-packages/wayfinder"]

[tool.bandit]
exclude_dirs = ["tests", ".venv"]

[tool.bandit.assert_used]
skips = ["*/tests/*"]
