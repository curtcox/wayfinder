[project]
name = "wayfinder"
version = "0.1.0"
description = "Unix command protocol for determining the next step to achieve a goal"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Curt Cox" }]
keywords = ["wayfinder", "cli", "protocol", "automation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.28,<1",
    "jsonschema>=4.23,<5",
    "rfc8785>=0.1.4,<1",
]

[project.optional-dependencies]
dev = [
    "bandit>=1.7,<2",
    "hypothesis>=6,<7",
    "mypy>=1.13,<2",
    "pip-audit>=2,<3",
    "pre-commit>=4,<5",
    "pytest>=9,<10",
    "pytest-cov>=6,<7",
    "pytest-html>=4,<5",
    "pytest-xdist>=3,<4",
    "radon>=6,<7",
    "ruff>=0.8,<1",
    "xenon>=0.9,<1",
]
docs = [
    "mkdocs>=1.6,<2",
    "mkdocs-material>=9.5,<10",
]
machines = [
    "py_trees>=2.2,<3",
    "pyperplan>=2.1",
    "pexpect>=4.9,<5",
]
[project.scripts]
wayfinder = "wayfinder.cli.main:main"
wayfinder-exec = "wayfinder.exec.main:main"
wayfinder-wrap = "wayfinder.wrap.main:main"
wayfinder-do = "wayfinder.do.main:main"
wayfinder-tell = "wayfinder.tell.main:main"
wayfinder-ask = "wayfinder.ask.main:main"
wayfinder-chat = "wayfinder.chat.main:main"
wayfinder-make = "wayfinder.make.main:main"
wayfinder-tw = "wayfinder.tw.main:main"
wayfinder-bt = "wayfinder.bt.main:main"
wayfinder-plan = "wayfinder.plan.main:main"
wayfinder-exec-pty = "wayfinder.exec_pty.main:main"
wayfinder-codex = "wayfinder.codex.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wayfinder"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests", "hooks"]

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812",
    "D100",
    "D104",
    "D203",
    "D213",
    "ISC001",
    "S101",
]

