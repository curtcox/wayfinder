name: Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    name: Full check suite and Pages deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra docs --extra machines

      - name: Install docs lint tools
        run: |
          npm install -g markdownlint-cli2
          curl -sSfL https://github.com/lycheeverse/lychee/releases/download/lychee-v0.24.1/lychee-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin --strip-components=1 lychee-x86_64-unknown-linux-gnu/lychee

      - name: Install jq and make
        run: sudo apt-get update && sudo apt-get install -y jq make

      - name: Lint and analysis
        run: |
          mkdir -p reports-out/tools
          set +e
          uv run ruff check . > reports-out/tools/ruff.txt 2>&1
          uv run mypy > reports-out/tools/mypy.txt 2>&1
          uv run bandit -r src -c pyproject.toml > reports-out/tools/bandit.txt 2>&1
          uv run pip-audit > reports-out/tools/pip-audit.txt 2>&1
          set -e
          make lint typecheck security complexity docs-lint

      - name: Run tests with reports
        run: |
          mkdir -p reports-out/pytest reports-out/coverage
          uv run pytest -n auto \
            --html=reports-out/pytest/report.html --self-contained-html \
            --junitxml=reports-out/pytest/junit.xml \
            --cov=wayfinder --cov-report=html:reports-out/coverage \
            --cov-report=json:reports-out/coverage/coverage.json \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80
          uv run coverage report --include='src/wayfinder/core/*' --fail-under=90

      - name: Run scripted examples
        run: make examples-scripted

      - name: Build documentation site
        run: uv run mkdocs build

      - name: Publish reports into site
        run: |
          mkdir -p site/reports
          cp -r reports-out/pytest site/reports/
          cp -r reports-out/coverage site/reports/
          cp -r reports-out/tools site/reports/
          SHA=$(git rev-parse HEAD)
          uv run python scripts/build_reports.py \
            --reports-dir reports-out \
            --site-reports-dir site/reports \
            --sha "$SHA" \
            --examples-json reports-out/examples.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
